version: '3.8'
services:
  # NOTE: The local 'db' service has been removed.
  # The backend now connects to Cloud SQL (charley-home-0510) via its Private IP.
  # Ensure VPC Peering / Private Service Connect is enabled on the Cloud SQL instance.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-truehuman}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
